<div>
    <app-cashier-cart></app-cashier-cart>
    <app-cashier-navigations></app-cashier-navigations>
</div>

<app-product-list *ngIf="cashierservice.isBrowsingProduct()"></app-product-list>
<app-checkout *ngIf="cashierservice.isCheckOut()"></app-checkout>

<div id="receipt-backdrop">
    <div id="receipt">
        <header>
            <div style="display: block; margin-top: -11px;">
                <p style="font-size: 40px; font-weight: 700; margin-left: -2px;">HezTech</p>
                <p style="font-size: 20px; margin-top: -5px;">Computer Store</p>
            </div>
            <div style="display: block; justify-items: end;">
                <p style="background-color: rgba(0, 0, 0, 0.8); height: 33px; width: 635px; margin-left: 20px; margin-bottom: 5px; align-content: start;"><span style="background-color: rgb(255, 255, 255); font-size: 25px; font-weight: 700; padding-right: 10px; padding-left: 10px; margin-left: 480px;">INVOICE</span></p>
                <p style="font-size: 14px;">Cabadbaran City, Agusan del Norte</p>
                <p style="font-size: 14px;"> Contact No. : 0963 349 2973</p>
            </div>
        </header>
        <div style="border-top: 1px solid black; border-bottom: 1px solid black; height: 40px; align-items: center; font-size: 14px; justify-content: space-between;">
            <p><span style="font-weight: 500;">Customer Name : </span>{{ service.loggedUser.name}}</p>
            <p><span style="font-weight: 500;">Date : </span> {{ cashierservice.time() | date:'MMM d, y - h:mm a' }}</p>
        </div>
    </div>
</div>
