<div id="main-container">
    <header>
        <h2 style="color: oklch(54.6% .245 262.881); font-size: 35px;">HezTech</h2>
        <p style="color: black; font-weight: 500; margin-top: -5px;">Computer Store</p>
    </header>
    <div id="user">
        <img src="assets/user-icon.png" alt="">
        <h3>{{ service.loggedUser.name }}</h3>
        <p>{{ service.loggedUser.type }}</p>
    </div>
    <section>
        <button style="background-color: rgb(70, 70, 237);" (click)="cashierservice.isBrowsingProduct.set(true)">Browse Products</button>
        <button style="background-color: rgb(34, 140, 34);" (click)="cashierservice.isCheckOut.set(true)" [disabled]="cashierservice.totalAmount() === 0">Checkout</button>
        <button style="background-color: rgb(246, 140, 35);">Sales Report</button>
        <button style="background-color: rgb(251, 72, 72);">Log Out</button>
    </section>
</div>
